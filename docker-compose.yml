version: '3.8'

services:
  postgres:
    image: ankane/pgvector:latest
    container_name: om-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-om_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-om_password}
      POSTGRES_DB: ${DB_NAME:-om_intelligence}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-om_user} -d ${DB_NAME:-om_intelligence}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: om-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
